<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerisa - Laporan Orang Tua</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            overflow-y: auto; /* Allow scrolling if content overflows slightly */
            display: flex;
            flex-direction: column;
        }

        .dashboard-content {
            padding: 15px 30px 40px 30px; /* Tambah padding bawah biar g kepotong */
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        .search-container {
            background: white;
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(148, 184, 233, 0.1);
            margin-bottom: 20px;
            text-align: center;
            border: 4px solid white;
        }

        .search-flex {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            justify-content: center;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px 20px;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            background-color: #fafbfc;
            font-family: inherit;
        }
        .search-input:focus { border-color: var(--btn-action); background: white; }

        /* Report View */
        .report-view {
            display: none;
            flex-grow: 1;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }
        
        .student-profile-card {
            background: white;
            border-radius: 18px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border-top: 5px solid var(--btn-action);
            margin-bottom: 25px;
        }

        .report-grid-3col {
            display: flex;
            gap: 20px;
            align-items: stretch;
            margin-bottom: 15px;
        }

        .report-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.02);
            text-align: left;
            border: 1.5px solid #f1f5f9;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 200px; /* Samakan tinggi minimal */
        }

        .report-box h4 {
            color: var(--text-muted);
            margin-bottom: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .report-box .metric {
            font-size: 3.5rem;
            font-family: 'Fredoka', sans-serif;
            color: var(--primary-blue-dark);
            line-height: 1;
            margin-bottom: 15px;
        }

        .activity-box {
            background: #fdfdfd;
            padding: 12px;
            border-radius: 12px;
            border-left: 5px solid var(--secondary-yellow);
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #f8fafc;
        }

        .progress-bar-bg {
            background: #f1f5f9;
            border-radius: 10px;
            height: 10px;
            margin-top: auto;
        }

        @media (max-width: 1100px) {
            .report-grid-3col { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Zerisa <span style="font-size:1rem; color:#059669;">(ORANG TUA)</span></div>
        <div>
            <span class="user-info" id="userNameDisplay">Halo!</span>
            <button class="btn-logout" id="logoutBtn">Keluar</button>
        </div>
    </nav>

    <div class="dashboard-content">
        <div class="header-section" style="margin-bottom: 20px;">
            <h2>Pantau Perkembangan Sang Anak</h2>
            <p style="color: var(--text-muted); font-weight: bold;">Rapor harian & perkembangan interaktif di Zerisa</p>
        </div>

        <div class="search-container">
            <h3 style="color: var(--primary-blue-dark); font-size: 1.5rem;">Akses Rapor Harian Siswa</h3>
            <div class="search-flex">
                <input type="text" id="searchInput" class="search-input" placeholder="Masukkan nama anak Anda...">
                <button class="btn" id="searchBtn" style="width: auto; margin-top:0;">Lihat Progress</button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <div class="report-view" id="reportView">
            <div class="student-profile-card">
                <div>
                    <h3 id="r_nama" style="font-size:1.8rem; color:var(--text-main); margin-bottom:5px;">Nama Anak</h3>
                    <p style="color:var(--text-muted);font-weight:700;">Status: <span id="r_kebutuhan" style="color:var(--btn-action);">Siswa</span></p>
                </div>
            </div>

            <div class="report-grid-3col">
                <div class="report-box">
                    <h4>Materi Diselesaikan</h4>
                    <div class="metric" id="r_materi">0</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="r_materi_bar"></div>
                    </div>
                </div>
                
                <div class="report-box">
                    <h4>Skor Kumulatif</h4>
                    <div class="metric" style="color:#22c55e;" id="r_score">0</div>
                </div>

                <div class="report-box activity-col">
                    <h4>Aktivitas Terakhir</h4>
                    <div class="activity-box">
                        <span style="font-size:0.75rem; color:var(--text-muted); font-weight:800;" id="r_waktu">Waktu Belajar</span>
                        <h4 style="color:var(--text-main); font-size: 1rem; margin-top:3px; margin-bottom: 5px;" id="r_materi_terakhir">Nama Modul</h4>
                        <p style="font-size: 0.85rem; font-weight: 600; color: #475569;" id="r_aktivitas">Ringkasan aktivitas anak.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="parent-dashboard.js"></script>
</body>
</html>
